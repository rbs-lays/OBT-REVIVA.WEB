<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReViva OBT - Login & Cadastro</title>
    <style>
        /* Estilização Geral - Inspiração iOS 18 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradiente inspirado nas cores da logo (Verde e Laranja) */
            background: linear-gradient(135deg, #1e3a34 0%, #2e5a4e 50%, #f39200 100%);
            overflow: hidden;
        }

        /* Efeito Glassmorphism (Vidro Fosco) */
        .container {
            position: relative;
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: all 0.5s ease-in-out;
        }

        /* Ajuste da Logo */
        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 220px; /* Tamanho ajustado para a logo ReViva */
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        h2 {
            color: white;
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        /* Inputs Estilo Apple */
        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: #fff;
            box-shadow: 0 0 0 4px rgba(68, 138, 58, 0.4);
        }

        /* Botão com Gradiente da Logo */
        .btn-primary {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            /* Gradiente extraído diretamente da logo ReViva */
            background: linear-gradient(90deg, #448a3a, #f39200);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        /* Links */
        .footer-links {
            margin-top: 25px;
            color: white;
            font-size: 14px;
        }

        .footer-links a {
            color: #f39200; /* Laranja da logo */
            text-decoration: none;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="formContainer">
        <div class="logo-container">
            <img src="WhatsApp Image 2026-04-16 at 11.08.50.jpeg" alt="Logo ReViva Campo Grande">
        </div>

        <div id="loginForm">
            <h2>Acesse sua conta</h2>
            <div class="input-group">
                <input type="text" placeholder="E-mail ou CPF">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Senha">
            </div>
            <button class="btn-primary">Entrar</button>
            <div class="footer-links">
                <p><a href="#">Esqueceu a senha?</a></p>
                <p style="margin-top: 10px;">Não tem uma conta? <a href="#" onclick="toggleForm()">Cadastre-se</a></p>
            </div>
        </div>

        <div id="registerForm" class="hidden">
            <h2>Crie sua conta OBT</h2>
            <div class="input-group">
                <input type="text" placeholder="Nome Completo">
            </div>
            <div class="input-group">
                <input type="email" placeholder="E-mail">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Senha">
            </div>
            <button class="btn-primary">Criar Conta</button>
            <div class="footer-links">
                <p>Já possui conta? <a href="#" onclick="toggleForm()">Fazer Login</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleForm() {
            const login = document.getElementById('loginForm');
            const register = document.getElementById('registerForm');
            
            // Alterna entre as telas
            login.classList.toggle('hidden');
            register.classList.toggle('hidden');
        }
    </script>
</body>
</html>
